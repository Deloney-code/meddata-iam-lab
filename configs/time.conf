# =============================================================
# MedData Research Hospital — PAM Time-of-Day Restrictions
# Task B: Enforce business hours login policy
# File: /etc/security/time.conf
# =============================================================

# Format: service;tty;user_or_group;time
# Time codes: Al=All days, Wk=Mon-Fri, Sa=Sat, Su=Sun
# Hours: HHMM format, ! means NOT

# Allow staff group SSH only Mon-Fri 0800-2000
sshd;*;%staff;Wk0800-2000

# Allow doctors group SSH Mon-Fri 0700-2100
sshd;*;%doctors;Wk0700-2100

# Allow audit_user SSH Mon-Fri business hours only
sshd;*;audit_user;Wk0800-1800

# Block ALL console logins between midnight and 6am for non-root
login;*;!root;!Al0000-0600